---
# User
pi_user: pi
pi_home: /home/pi
pi_locale: en_US.UTF-8

# Paths
data_path: /mnt/data
repo_path: "{{ pi_home }}/rpi-media-server"
repo_url: git@github.com:dpinhas/rpi-media-server.git
repo_branch: main

# Network
duckdns_domain: dpinhas.duckdns.org
local_subnet: 192.168.68.0/24

# Git identity
git_user_name: Dor Pinhas
git_user_email: dor.pinhas1@gmail.com

# System packages shared across all hosts
common_packages:
  - vim
  - git
  - libffi-dev
  - libssl-dev
  - python3-dev
  - python3
  - python3-pip
  - nfs-common
  - needrestart
