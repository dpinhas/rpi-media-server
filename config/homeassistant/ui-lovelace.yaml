title: Home

views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    max_columns: 3
    sections:
      - title: All Blinds
        type: grid
        cards:
          - type: heading
            heading: Blinds
            heading_style: title
            icon: mdi:blinds
          - type: tile
            entity: cover.bedroom_blind
            name: Bedroom
            features:
              - type: cover-open-close
              # - type: cover-position
          - type: tile
            entity: cover.2nd_bedroom_blind
            name: 2nd Bedroom
            features:
              - type: cover-open-close
              # - type: cover-position
          - type: tile
            entity: cover.kitchen_blind
            name: Kitchen
            features:
              - type: cover-open-close
              # - type: cover-position
          - type: tile
            entity: cover.living_room_blind
            name: Living Room
            features:
              - type: cover-open-close
              # - type: cover-position

      - title: Lights
        type: grid
        cards:
          - type: heading
            heading: Lights
            heading_style: title
            icon: mdi:lightbulb-group
          - type: tile
            entity: switch.kitchen_gang_switch_l1
            name: Living Room Light
            icon: mdi:ceiling-light
          - type: tile
            entity: switch.kitchen_gang_switch_l2
            name: Kitchen Island
            icon: mdi:ceiling-light
          - type: tile
            entity: switch.kitchen_spots
            name: Kitchen Spots
            icon: mdi:spotlight-beam
          - type: tile
            entity: switch.kitchen_table_light
            name: Kitchen Table
            icon: mdi:lamp

      - title: Status
        type: grid
        cards:
          - type: heading
            heading: Status
            heading_style: title
            icon: mdi:information
          - type: tile
            entity: person.dor
            name: Dor
          - type: tile
            entity: sensor.dors_iphone_battery_level
            name: iPhone Battery
            icon: mdi:cellphone
          - type: tile
            entity: sensor.sun_next_setting
            name: Sunset
            icon: mdi:weather-sunset-down

  - title: Rooms
    path: rooms
    icon: mdi:floor-plan
    type: sections
    max_columns: 2
    sections:
      - title: Kitchen
        type: grid
        cards:
          - type: heading
            heading: Kitchen
            heading_style: title
            icon: mdi:fridge
          - type: tile
            entity: cover.kitchen_blind
            name: Blind
            features:
              - type: cover-open-close
              # - type: cover-position
          - type: tile
            entity: switch.kitchen_gang_switch_l2
            name: Island Light
            icon: mdi:ceiling-light
          - type: tile
            entity: switch.kitchen_spots
            name: Spots
            icon: mdi:spotlight-beam
          - type: tile
            entity: switch.kitchen_table_light
            name: Table Light
            icon: mdi:lamp

      - title: Living Room
        type: grid
        cards:
          - type: heading
            heading: Living Room
            heading_style: title
            icon: mdi:sofa
          - type: tile
            entity: cover.living_room_blind
            name: Blind
            features:
              - type: cover-open-close
              # - type: cover-position
          - type: tile
            entity: switch.kitchen_gang_switch_l1
            name: Light
            icon: mdi:ceiling-light

      - title: Bedroom
        type: grid
        cards:
          - type: heading
            heading: Bedroom
            heading_style: title
            icon: mdi:bed-king-outline
          - type: tile
            entity: cover.bedroom_blind
            name: Blind
            features:
              - type: cover-open-close
              # - type: cover-position

      - title: 2nd Bedroom
        type: grid
        cards:
          - type: heading
            heading: 2nd Bedroom
            heading_style: title
            icon: mdi:bed-king-outline
          - type: tile
            entity: cover.2nd_bedroom_blind
            name: Blind
            features:
              - type: cover-open-close
              # - type: cover-position